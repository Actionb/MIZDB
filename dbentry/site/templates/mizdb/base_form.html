{% extends "mizdb/base.html" %}
{% load formsetify static %}

{% block extrahead %}
  {{ block.super }}
  {{ form.media }}
  <script type="module" src="{% static 'formset/js/django-formset.js' %}"></script>
{% endblock extrahead %}

{% block content %}
<django-formset endpoint="{{ request.path }}" csrf-token="{{ csrf_token }}">
  {% render_form form "bootstrap" %}
  <button type="button" click="submit -> proceed">Ok!</button>
</django-formset>
{% endblock content %}
