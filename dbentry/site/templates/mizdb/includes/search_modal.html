{% load static %}
<div class="modal fade" id="searchModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
          {# TODO: use the correct url name for site_search #}
        <form class="d-flex align-items-center w-100" action="{% url 'site_search' %}">
            <input id="searchInput" class="form-control me-2 h-100" type="search" placeholder="Suchen" name="q" data-search-url="{% url 'searchbar_search' %}">
            <button class="btn btn-secondary my-2 my-sm-0" type="submit">
                <img src="{% static 'mizdb/img/search.svg' %}">
            </button>
        </form>
      </div>
      <div class="modal-body">
          <div id="searchResults">
          </div>
      </div>
    </div>
  </div>
</div>
